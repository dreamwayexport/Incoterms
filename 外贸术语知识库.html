<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>外贸专业术语知识库</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f2ec;
  --surface: #fffdf8;
  --surface2: #f0ece3;
  --border: #d8d2c4;
  --border-light: #e8e3d8;
  --text: #1a1714;
  --text-muted: #6b6560;
  --text-faint: #9e9890;
  --accent: #2b4a8c;
  --accent-light: #e8edf7;
  --accent2: #8c4a2b;
  --accent3: #2b7a4a;
  --mono: 'IBM Plex Mono', monospace;
  --serif: 'Noto Serif SC', serif;
  --sans: 'Noto Sans SC', sans-serif;
  --radius: 4px;
  --radius-lg: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.04);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

/* Layout */
.page { display: flex; min-height: 100vh; }

/* Sidebar */
.sidebar {
  width: 240px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.sidebar-logo {
  padding: 24px 20px 16px;
  border-bottom: 1px solid var(--border-light);
}

.sidebar-logo .logo-mark {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: .15em;
  color: var(--text-faint);
  text-transform: uppercase;
  margin-bottom: 4px;
}

.sidebar-logo h2 {
  font-family: var(--serif);
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
}

.sidebar-stats {
  padding: 12px 20px;
  border-bottom: 1px solid var(--border-light);
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.stat-item {
  text-align: center;
  padding: 8px 4px;
  background: var(--bg);
  border-radius: var(--radius);
}

.stat-item .n {
  font-family: var(--mono);
  font-size: 20px;
  font-weight: 500;
  color: var(--accent);
  display: block;
}

.stat-item .l {
  font-size: 10px;
  color: var(--text-faint);
  letter-spacing: .04em;
}

.nav-section {
  padding: 12px 0;
  flex: 1;
}

.nav-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: .1em;
  color: var(--text-faint);
  text-transform: uppercase;
  padding: 0 20px 6px;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 20px;
  font-size: 13px;
  color: var(--text-muted);
  cursor: pointer;
  transition: all .15s;
  border-left: 2px solid transparent;
  text-decoration: none;
}

.nav-item:hover { background: var(--bg); color: var(--text); }

.nav-item.active {
  color: var(--accent);
  border-left-color: var(--accent);
  background: var(--accent-light);
  font-weight: 500;
}

.nav-item .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

.nav-item .cnt {
  margin-left: auto;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-faint);
}

/* Main */
.main { flex: 1; min-width: 0; }

/* Header */
.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 32px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 10;
}

.search-wrap {
  flex: 1;
  max-width: 480px;
  position: relative;
}

.search-wrap svg {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-faint);
  pointer-events: none;
}

.search-wrap input {
  width: 100%;
  height: 34px;
  padding: 0 12px 0 34px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  outline: none;
  transition: border-color .15s;
}

.search-wrap input:focus { border-color: var(--accent); }
.search-wrap input::placeholder { color: var(--text-faint); }

.filter-pills {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.pill {
  padding: 3px 10px;
  font-size: 12px;
  border: 1px solid var(--border);
  border-radius: 20px;
  cursor: pointer;
  background: var(--surface);
  color: var(--text-muted);
  transition: all .15s;
  white-space: nowrap;
  font-family: var(--sans);
}

.pill:hover { border-color: var(--accent); color: var(--accent); }

.pill.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

/* Content */
.content { padding: 28px 32px 48px; }

.section-block { margin-bottom: 32px; }

.section-head {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border-light);
}

.section-head .cat-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

.section-head h3 {
  font-family: var(--serif);
  font-size: 17px;
  font-weight: 600;
  color: var(--text);
}

.section-head .cat-count {
  margin-left: auto;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text-faint);
}

.terms-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 10px;
}

.term-card {
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-lg);
  padding: 14px 16px;
  transition: border-color .15s, box-shadow .15s;
  cursor: default;
}

.term-card:hover {
  border-color: var(--border);
  box-shadow: var(--shadow);
}

.tc-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 3px;
}

.tc-abbr {
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 500;
  color: var(--accent);
  letter-spacing: -.01em;
}

.tc-tag {
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 10px;
  white-space: nowrap;
  margin-top: 2px;
  flex-shrink: 0;
}

.tc-name {
  font-size: 12px;
  color: var(--text-faint);
  margin-bottom: 6px;
  line-height: 1.4;
}

.tc-desc {
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.65;
}

/* highlight */
mark {
  background: #fff1a8;
  color: inherit;
  border-radius: 2px;
  padding: 0 1px;
}

/* empty */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-faint);
}

.empty-state .icon {
  font-size: 40px;
  margin-bottom: 12px;
  opacity: .3;
}

.empty-state p { font-size: 14px; }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Footer */
.sidebar-footer {
  padding: 16px 20px;
  border-top: 1px solid var(--border-light);
  font-size: 11px;
  color: var(--text-faint);
  line-height: 1.6;
}

/* Responsive */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .content { padding: 16px; }
  .topbar { padding: 10px 16px; flex-wrap: wrap; }
  .filter-pills { display: none; }
  .terms-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="page">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">Knowledge Base</div>
      <h2>外贸专业<br>术语知识库</h2>
    </div>

    <div class="sidebar-stats">
      <div class="stat-item"><span class="n" id="totalCount">—</span><span class="l">术语总数</span></div>
      <div class="stat-item"><span class="n">10</span><span class="l">分类数量</span></div>
      <div class="stat-item"><span class="n">2025</span><span class="l">版本年份</span></div>
      <div class="stat-item"><span class="n" id="visCount">—</span><span class="l">当前显示</span></div>
    </div>

    <nav class="nav-section">
      <div class="nav-label">术语分类</div>
      <div id="navList"></div>
    </nav>

    <div class="sidebar-footer">
      涵盖 Incoterms、支付方式、<br>单据、物流、合规、跨境电商<br>等核心外贸领域术语
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="搜索术语、缩写或说明…" oninput="render()">
      </div>
      <div class="filter-pills" id="pillBar"></div>
    </div>

    <div class="content" id="mainContent"></div>
  </div>
</div>

<script>
const CATS = [
  {
    id:"incoterms", name:"贸易术语 (Incoterms)", color:"#2b4a8c", bg:"#e8edf7",
    terms:[
      {abbr:"EXW",name:"Ex Works / 工厂交货",desc:"卖方在其所在地交货，买方负担此后所有费用与风险，包括出口清关。适合有较强物流能力的买方。"},
      {abbr:"FCA",name:"Free Carrier / 货交承运人",desc:"卖方完成出口清关后，在指定地点将货物交给买方指定的承运人，风险自此转移给买方。"},
      {abbr:"FAS",name:"Free Alongside Ship / 船边交货",desc:"卖方将货物运至买方指定港口船边，风险自此转移给买方，买方负责装船及之后所有费用。"},
      {abbr:"FOB",name:"Free On Board / 离岸价",desc:"货物在装运港越过船舷后风险转移买方，卖方负责出口清关及装船前费用。外贸报价中最常用的术语。"},
      {abbr:"CFR",name:"Cost and Freight / 成本加运费",desc:"卖方支付运费至目的港，但货物越过船舷后风险即转买方，买方须自行负责保险。"},
      {abbr:"CIF",name:"Cost, Insurance and Freight / 到岸价",desc:"卖方支付运费和保险费至目的港。CIF = FOB + 运费 + 保险费，是外贸报价极常用的组合。"},
      {abbr:"CPT",name:"Carriage Paid To / 运费付至",desc:"卖方支付运费至指定目的地，但风险在货物交付承运人时即转移给买方，适用于多式联运。"},
      {abbr:"CIP",name:"Carriage and Insurance Paid To / 运费保险费付至",desc:"类似CPT但额外要求卖方投保货物险，是Incoterms 2020中对卖方保险要求最高的术语（最低ICC A险）。"},
      {abbr:"DAP",name:"Delivered at Place / 目的地交货",desc:"卖方负责将货物运至指定目的地并置于运输工具上，不负责卸货，买方负责进口清关及关税。"},
      {abbr:"DPU",name:"Delivered at Place Unloaded / 卸货地交货",desc:"卖方负责在目的地完成卸货，是Incoterms中唯一要求卖方负责卸货的术语（Incoterms 2020新增，原DAT）。"},
      {abbr:"DDP",name:"Delivered Duty Paid / 完税后交货",desc:"卖方承担最大义务，包括目的地进口清关、关税，货物交付买方后风险才转移，对卖方要求最高。"},
    ]
  },
  {
    id:"payment", name:"付款方式", color:"#0f6e56", bg:"#e1f5ee",
    terms:[
      {abbr:"L/C",name:"Letter of Credit / 信用证",desc:"由银行开立的有条件付款承诺，卖方只要提交符合信用证要求的单据即可获得付款。是最安全的付款方式之一，分即期LC（Sight LC）和远期LC（Usance LC）。"},
      {abbr:"D/P",name:"Documents against Payment / 付款交单",desc:"卖方通过银行托收，买方付款后才能取得提单等单据提货。即期D/P（D/P at Sight）风险较小。"},
      {abbr:"D/A",name:"Documents against Acceptance / 承兑交单",desc:"买方承兑汇票后即可取得单据提货，到期才付款。风险高于D/P，若买方无力付款，卖方损失较大。"},
      {abbr:"T/T",name:"Telegraphic Transfer / 电汇",desc:"最常见付款方式，通过SWIFT系统进行银行间转账。分为前T/T（预付款）和后T/T（发货后付余款），灵活便捷。"},
      {abbr:"O/A",name:"Open Account / 赊账",desc:"卖方先发货，买方在约定期限内付款（如30/60/90天），对卖方风险极高，仅适合长期信任合作伙伴。"},
      {abbr:"CAD",name:"Cash Against Documents / 凭单付现",desc:"买方付现金后取得单据，类似D/P但不通过银行，通常在买方所在地进行，风险较高。"},
      {abbr:"SBLC",name:"Standby Letter of Credit / 备用信用证",desc:"以不使用为前提的备用付款保障，仅在主合同违约时方才启用，作为赔偿担保依据。"},
      {abbr:"SWIFT",name:"Society for Worldwide Interbank Financial Telecommunication",desc:"国际银行间报文交换系统，T/T电汇使用SWIFT代码（BIC）来唯一识别收款银行，全球覆盖200+国家。"},
      {abbr:"BIC",name:"Bank Identifier Code / 银行识别码",desc:"即SWIFT代码，用于国际电汇中唯一识别银行，通常8或11位字符，如中国工商银行ICBKCNBJ。"},
      {abbr:"IBAN",name:"International Bank Account Number / 国际银行账号",desc:"欧洲及部分国家使用的标准化银行账号格式，最长34位字母数字，用于国际汇款，汇欧洲时必须提供。"},
    ]
  },
  {
    id:"docs", name:"单据与文件", color:"#993c1d", bg:"#faece7",
    terms:[
      {abbr:"B/L",name:"Bill of Lading / 提单",desc:"海运最重要单据，同时是运输合同凭证、货物收据和货权凭证。持正本B/L才能提货，分可转让（Order B/L）和不可转让（Straight B/L）。"},
      {abbr:"AWB",name:"Air Waybill / 空运单",desc:"航空运输凭证，是运输合同和货物收据，但非物权凭证，不可转让，目的地凭收件人身份证明提货。"},
      {abbr:"C/I",name:"Commercial Invoice / 商业发票",desc:"最核心的贸易单据，详列货物品名、规格、数量、单价、总价、贸易术语及买卖双方信息，用于报关和结汇。"},
      {abbr:"P/L",name:"Packing List / 装箱单",desc:"详细列明每箱货物的品名、数量、净重、毛重、箱尺寸及箱号，与发票配合使用，是海关查验的重要依据。"},
      {abbr:"C/O",name:"Certificate of Origin / 原产地证书",desc:"证明货物产地的官方证书，享受关税优惠的必要单据。Form A（普惠制）、Form E（中国-东盟FTA）等各有适用范围。"},
      {abbr:"S/C",name:"Sales Contract / 销售合同",desc:"买卖双方签订的贸易合同，是整个交易的法律依据，包含品名、价格、数量、交货期、付款方式等核心条款。"},
      {abbr:"P/I",name:"Proforma Invoice / 形式发票",desc:"正式发票前的预开发票，用于买方申请进口许可证、开立信用证或安排预付款，不作为正式结算凭证。"},
      {abbr:"D/O",name:"Delivery Order / 提货单",desc:"货代或船公司签发，凭此单到仓库或堆场提取货物，进口商须向船公司换取D/O才能提货。"},
      {abbr:"S/O",name:"Shipping Order / 装货单",desc:"货代或船公司签发给托运人的装货指令，凭此单将货物送上船，亦称下货纸（Dock Receipt）。"},
      {abbr:"COA",name:"Certificate of Analysis / 检测报告",desc:"产品质量检测合格证明，列明产品的各项检测指标，化工、食品、医药等行业出口必备单据。"},
      {abbr:"MSDS",name:"Material Safety Data Sheet / 化学品安全说明书",desc:"化学品危险性说明文件，详述成分、危险性、急救措施、运输要求，国际运输危险品时必须提供，现称SDS。"},
      {abbr:"L/G",name:"Letter of Guarantee / 保函",desc:"银行或公司出具的担保文件，常用于无正本提单提货（提单未到港先行提货）、质量保证、履约担保等场合。"},
      {abbr:"S/I",name:"Shipping Instruction / 装运指示",desc:"托运人给货代的装运指令，包含收发货人信息、通知方、货物描述、运输条款等，用于制作提单。"},
      {abbr:"M/T",name:"Mate's Receipt / 大副收据",desc:"船方大副签发的货物收据，证明货物已装上船，是正式提单签发前的临时凭证。"},
      {abbr:"SGS",name:"Société Générale de Surveillance / 检验机构",desc:"全球最大第三方检验机构，SGS检验报告常用于信用证条款或买家装运前检验（PSI）要求。"},
    ]
  },
  {
    id:"logistics", name:"物流与运输", color:"#3b6d11", bg:"#eaf3de",
    terms:[
      {abbr:"FCL",name:"Full Container Load / 整箱",desc:"货物装满一个或多个集装箱，货主独享整箱，运价通常按每箱计，适合大批量货物，成本较低、安全性高。"},
      {abbr:"LCL",name:"Less than Container Load / 拼箱",desc:"货物不足一箱，与其他货主拼装，按CBM或KG计费，适合小批量货物，需支付额外拼箱费（CFS费）。"},
      {abbr:"TEU",name:"Twenty-foot Equivalent Unit / 标准集装箱",desc:"以20英尺集装箱为基本计量单位，40英尺箱=2TEU，是衡量港口吞吐能力的标准单位。"},
      {abbr:"ETA",name:"Estimated Time of Arrival / 预计到达时间",desc:"船舶或货物预计抵达目的港的时间，是跟踪货物动态最重要的时间节点。"},
      {abbr:"ETD",name:"Estimated Time of Departure / 预计出发时间",desc:"船舶预计从装运港出发的时间，与ETA共同用于安排物流计划。"},
      {abbr:"POL",name:"Port of Loading / 装运港",desc:"货物起运装船的港口，也是出口报关地点。"},
      {abbr:"POD",name:"Port of Discharge / 卸货港",desc:"货物从船上卸下的港口，通常即最终目的港。"},
      {abbr:"T/S",name:"Trans-shipment / 转运",desc:"货物在途中换乘另一船继续运往目的港，非直航（Direct Sailing）情况下常见，会增加运输时间和费用。"},
      {abbr:"CFS",name:"Container Freight Station / 集装箱货运站",desc:"处理拼箱货物的专用场所，拼箱货在此集结、装箱、拆箱，产生CFS操作费。"},
      {abbr:"CY",name:"Container Yard / 集装箱堆场",desc:"存放整箱集装箱的堆存场地，整箱货物在此交接，CY-CY即门对门整箱运输。"},
      {abbr:"FF",name:"Freight Forwarder / 货代",desc:"代理托运人安排国际货物运输的专业公司，提供订舱、报关、拼箱、单据等全套服务，是外贸不可缺少的伙伴。"},

let searchQ = "";
let activeFilter = "全部";

function esc(s){ return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function hl(text){
  if(!searchQ) return esc(text);
  const re = new RegExp(`(${searchQ.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return esc(text).replace(re,'<mark>$1</mark>');
}

  const nav = document.getElementById('navList');
  const allBtn = `<a class="nav-item${activeFilter==='全部'?' active':''}" onclick="setFilter('全部')"><span class="dot" style="background:#888"></span>全部 <span class="cnt">${CATS.reduce((s,c)=>s+c.terms.length,0)}</span></a>`;
  const items = CATS.map(c=>`<a class="nav-item${activeFilter===c.name?' active':''}" onclick="setFilter('${c.name}')"><span class="dot" style="background:${c.color}"></span>${c.name.split(' ')[0]} <span class="cnt">${c.terms.length}</span></a>`).join('');
  nav.innerHTML = allBtn + items;
}

function buildPills(){
  const bar = document.getElementById('pillBar');
  const cats = ['全部', ...CATS.map(c=>c.name.split(' ')[0])];
  bar.innerHTML = cats.map((c,i)=>`<button class="pill${(i===0&&activeFilter==='全部')||(i>0&&CATS[i-1].name.split(' ')[0]===activeFilter.split(' ')[0])?' active':''}" onclick="setFilter(${i===0?"'全部'":"'"+CATS[i-1].name+"'"})">${c}</button>`).join('');
}

function setFilter(f){ activeFilter=f; buildNav(); buildPills(); render(); }

function render(){
  const q = searchQ.toLowerCase();
  const cats = activeFilter==='全部' ? CATS : CATS.filter(c=>c.name===activeFilter);
  let html = '';
  let totalVis = 0;

  cats.forEach(cat => {
    const filtered = cat.terms.filter(t => {
      if(!q) return true;
      return t.abbr.toLowerCase().includes(q) || t.name.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q);
    });
    if(!filtered.length) return;
    totalVis += filtered.length;

    html += `<div class="section-block">
      <div class="section-head">
        <span class="cat-dot" style="background:${cat.color}"></span>
        <h3>${esc(cat.name)}</h3>
        <span class="cat-count">${filtered.length} 条</span>
      </div>
      <div class="terms-grid">
        ${filtered.map(t=>`
          <div class="term-card">
            <div class="tc-top">
              <span class="tc-abbr">${hl(t.abbr)}</span>
              <span class="tc-tag" style="background:${cat.bg};color:${cat.color}">${esc(cat.name.split(' ')[0])}</span>
            </div>
            <div class="tc-name">${hl(t.name)}</div>
            <div class="tc-desc">${hl(t.desc)}</div>
          </div>
        `).join('')}
      </div>
    </div>`;
  });

  if(!totalVis){
    html = `<div class="empty-state"><div class="icon">🔍</div><p>未找到匹配"${esc(searchQ)}"的术语，请尝试其他关键词</p></div>`;
  }

  document.getElementById('mainContent').innerHTML = html;
  document.getElementById('visCount').textContent = totalVis;
}

// init
document.getElementById('totalCount').textContent = CATS.reduce((s,c)=>s+c.terms.length,0);
document.getElementById('visCount').textContent = CATS.reduce((s,c)=>s+c.terms.length,0);
document.getElementById('searchInput').addEventListener('input', e=>{ searchQ=e.target.value.trim(); buildNav(); buildPills(); render(); });

buildNav();
buildPills();
render();
</script>
</body>
</html>
